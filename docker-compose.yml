version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: google-calendar-db-prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - google-calendar-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: google-calendar-api-prod
    environment:
      NODE_ENV: production
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${PORT}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - google-calendar-network

volumes:
  postgres_data_prod:
    driver: local

networks:
  google-calendar-network:
    driver: bridge