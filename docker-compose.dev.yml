version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: google-calendar-db-prod
    environment:
      POSTGRES_USER: ${DB_USER:-googlecalendardb}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sJ95NLcccVdTWhOlRvjC7P5SZB7HGNSZ}
      POSTGRES_DB: ${DB_NAME:-googlecalendardb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-googlecalendardb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - google-calendar-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: google-calendar-api-prod
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY:-}
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - google-calendar-network

volumes:
  postgres_data_prod:
    driver: local

networks:
  google-calendar-network:
    driver: bridge
